<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Previa 3D de Sublimacao em Caneca 11oz</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #0c2440;
      --paper: #f8fbfd;
      --muted: #64758a;
      --line: rgba(184, 139, 63, .28);
      --accent: #b8893d;
      --accent-2: #173554;
      --gold: #c89645;
      --sky: #dcecf6;
      --shadow: 0 28px 70px rgba(55, 82, 104, .18);
      --progress: 0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(205,226,240,.95), transparent 26%),
        radial-gradient(circle at 92% 82%, rgba(207,229,242,.9), transparent 25%),
        linear-gradient(180deg, #f8fbfd 0%, #eaf4fa 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      inset: 0;
      background:
        radial-gradient(ellipse at 5% 86%, rgba(255,255,255,.95) 0 8%, transparent 22%),
        radial-gradient(ellipse at 14% 91%, rgba(255,255,255,.82) 0 6%, transparent 17%),
        radial-gradient(ellipse at 90% 9%, rgba(255,255,255,.88) 0 7%, transparent 20%),
        radial-gradient(ellipse at 98% 16%, rgba(255,255,255,.78) 0 5%, transparent 16%);
      opacity: .9;
    }

    body::after {
      right: -90px;
      top: -80px;
      width: 360px;
      height: 360px;
      border: 1px solid rgba(184, 139, 63, .34);
      border-radius: 50%;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    main::before,
    main::after {
      content: "";
      position: absolute;
      pointer-events: none;
      z-index: -1;
    }

    main::before {
      left: clamp(20px, 6vw, 92px);
      bottom: clamp(16px, 5vw, 70px);
      width: 220px;
      height: 220px;
      border-left: 1px solid rgba(184, 139, 63, .28);
      border-bottom: 1px solid rgba(184, 139, 63, .20);
      border-radius: 0 0 0 140px;
    }

    main::after {
      right: clamp(28px, 7vw, 110px);
      top: 130px;
      width: 120px;
      height: 160px;
      background:
        radial-gradient(circle, rgba(184,139,63,.5) 0 2px, transparent 2.5px) 0 0 / 22px 22px;
      opacity: .38;
    }

    .topbar {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      padding: 26px clamp(20px, 5vw, 64px) 18px;
      border-bottom: 1px solid rgba(184, 139, 63, .18);
      background: rgba(248, 251, 253, .76);
      backdrop-filter: blur(12px);
    }

    .topbar::after {
      content: "";
      position: absolute;
      left: clamp(20px, 5vw, 64px);
      right: clamp(20px, 5vw, 64px);
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,139,63,.62), transparent);
    }

    .brand::before {
      content: "CATALOGO DE CANECAS PERSONALIZADAS";
      display: block;
      margin-bottom: 10px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .28em;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .32em;
      text-transform: uppercase;
    }

    .brand-mark::after {
      content: "";
      display: inline-block;
      width: 74px;
      height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .cloud-icon {
      position: relative;
      width: 46px;
      height: 24px;
      flex: 0 0 auto;
    }

    .cloud-icon::before,
    .cloud-icon::after,
    .cloud-core {
      content: "";
      position: absolute;
      background: #fff;
      border: 1px solid rgba(184, 139, 63, .42);
      box-shadow: 0 12px 24px rgba(99, 137, 162, .14);
    }

    .cloud-core {
      left: 8px;
      right: 4px;
      bottom: 2px;
      height: 14px;
      border-radius: 999px;
    }

    .cloud-icon::before {
      left: 4px;
      bottom: 3px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
    }

    .cloud-icon::after {
      left: 19px;
      bottom: 7px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
    }

    .duven-spark {
      position: absolute;
      width: 12px;
      height: 12px;
      pointer-events: none;
    }

    .duven-spark::before,
    .duven-spark::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--gold);
      border-radius: 999px;
    }

    .duven-spark::before {
      width: 2px;
      height: 12px;
    }

    .duven-spark::after {
      width: 12px;
      height: 2px;
    }

    .spark-a {
      left: 48%;
      top: 92px;
      opacity: .72;
    }

    .spark-b {
      right: 8%;
      top: 45%;
      opacity: .48;
      transform: scale(.72);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      color: var(--ink);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(44px, 6vw, 94px);
      font-weight: 400;
      line-height: .95;
      letter-spacing: 0;
      text-transform: none;
    }

    .subtitle {
      margin: 16px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 18px);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    .file-button,
    .reset-button {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 20px;
      border: 1px solid rgba(184, 139, 63, .42);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 16px 32px rgba(61, 91, 111, .14);
      position: relative;
      overflow: visible;
    }

    .file-button::before,
    .reset-button::before {
      content: "";
      position: absolute;
      left: 18px;
      top: -9px;
      width: 24px;
      height: 18px;
      border-radius: 999px 999px 0 0;
      background: inherit;
      border-top: 1px solid rgba(184, 139, 63, .34);
      pointer-events: none;
    }

    .file-button::after,
    .reset-button::after {
      content: "";
      position: absolute;
      right: 22px;
      top: -7px;
      width: 20px;
      height: 16px;
      border-radius: 999px 999px 0 0;
      background: inherit;
      border-top: 1px solid rgba(184, 139, 63, .28);
      pointer-events: none;
    }

    .file-button {
      border-color: rgba(184, 139, 63, .54);
      background: linear-gradient(180deg, #fff 0%, #f6fbfd 100%);
    }

    .reset-button {
      appearance: none;
      background: rgba(255,255,255,.54);
      color: var(--ink);
    }

    input[type="file"] {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .workspace {
      position: relative;
      display: grid;
      grid-template-columns: minmax(360px, .95fr) minmax(460px, 1.05fr);
      align-items: stretch;
      gap: clamp(18px, 3vw, 36px);
      padding: clamp(18px, 4vw, 54px) clamp(20px, 5vw, 64px) clamp(22px, 4vw, 56px);
      min-height: 0;
    }

    .workspace::before {
      content: "";
      position: absolute;
      left: clamp(24px, 5vw, 80px);
      top: clamp(18px, 4vw, 46px);
      width: 86px;
      height: 140px;
      border-left: 1px solid rgba(184,139,63,.34);
      border-radius: 80px 0 0 0;
      opacity: .7;
      pointer-events: none;
    }

    .workspace::after {
      content: "♡";
      position: absolute;
      right: clamp(24px, 5vw, 74px);
      bottom: clamp(20px, 5vw, 68px);
      color: rgba(184,139,63,.58);
      font-size: 28px;
      pointer-events: none;
    }

    .art-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 14px;
      align-self: center;
    }

    .art-panel::after {
      content: "";
      width: min(300px, 58%);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,139,63,.66), transparent);
      align-self: center;
    }

    .art-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 2100 / 950;
      overflow: hidden;
      border: 1px solid rgba(184, 139, 63, .22);
      border-radius: 8px;
      background: #f7f7f5;
      box-shadow: var(--shadow);
      cursor: crosshair;
      touch-action: none;
      isolation: isolate;
    }

    .art-panel::before {
      content: "DUVEN7";
      align-self: flex-start;
      color: rgba(184, 139, 63, .78);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 15px;
      letter-spacing: .42em;
    }

    .art-frame::before {
      content: "ARTE";
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 5;
      padding: 7px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, .82);
      color: var(--ink);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .18em;
    }

    .art-image,
    .art-demo {
      position: absolute;
      inset: 0;
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }

    .art-image {
      opacity: 0;
    }

    canvas.art-image {
      display: block;
      width: 100%;
      height: 100%;
    }

    .has-custom-art .art-image {
      opacity: 1;
    }

    .has-custom-art .art-demo {
      opacity: 0;
    }

    .art-demo {
      background:
        radial-gradient(circle at 13% 22%, rgba(255, 255, 255, .7) 0 5%, transparent 5.2%),
        radial-gradient(circle at 76% 34%, rgba(255, 255, 255, .56) 0 4%, transparent 4.2%),
        linear-gradient(110deg, rgba(255, 214, 88, .95), rgba(240, 90, 104, .92) 28%, rgba(24, 138, 198, .9) 58%, rgba(15, 159, 143, .96)),
        repeating-linear-gradient(135deg, rgba(255,255,255,.2) 0 22px, rgba(255,255,255,0) 22px 44px);
    }

    .scan {
      position: absolute;
      inset: 0;
      width: calc(var(--progress) * 100%);
      overflow: hidden;
      z-index: 2;
      border-right: 3px solid var(--gold);
      box-shadow: 22px 0 34px rgba(184, 139, 63, .18);
      pointer-events: none;
    }

    .scan::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 100vw;
      max-width: none;
      background: rgba(255, 255, 255, .16);
      mix-blend-mode: screen;
    }

    .progress-line {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 7px;
      width: calc(var(--progress) * 100%);
      background: linear-gradient(90deg, #173554, var(--gold), #d8aa57);
      z-index: 3;
      transition: width .08s linear;
    }

    .hint {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .mug-stage {
      position: relative;
      min-height: min(62vh, 640px);
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid rgba(184, 139, 63, .20);
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 255, 255, .9), rgba(218, 229, 234, .46) 31%, transparent 55%),
        linear-gradient(145deg, #f9fcfd 0%, #eaf4f8 52%, #d7e7ef 100%);
      box-shadow: var(--shadow);
      padding: 0;
      isolation: isolate;
    }

    .mug-arch {
      position: absolute;
      left: 50%;
      top: 12%;
      width: min(64%, 420px);
      aspect-ratio: 1 / 1.18;
      transform: translateX(-50%);
      border: 1px solid rgba(184,139,63,.42);
      border-bottom: 0;
      border-radius: 999px 999px 0 0;
      pointer-events: none;
      z-index: 1;
    }

    .mug-arch::after {
      content: "";
      position: absolute;
      inset: 10px 10px 0;
      border: 1px solid rgba(184,139,63,.24);
      border-bottom: 0;
      border-radius: inherit;
    }

    .mug-stage .cloud-float {
      position: absolute;
      pointer-events: none;
      z-index: 1;
      opacity: .72;
      filter: drop-shadow(0 18px 26px rgba(80, 117, 143, .12));
    }

    .cloud-float.one {
      left: 7%;
      top: 10%;
      width: 150px;
      height: 62px;
    }

    .cloud-float.two {
      right: 8%;
      bottom: 14%;
      width: 190px;
      height: 74px;
      opacity: .52;
    }

    .cloud-float::before,
    .cloud-float::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,.86);
      border-radius: 999px;
    }

    .cloud-float::before {
      inset: 28px 0 0 0;
    }

    .cloud-float::after {
      left: 24%;
      top: 0;
      width: 44%;
      height: 70%;
      box-shadow:
        -38px 18px 0 rgba(255,255,255,.72),
        48px 17px 0 rgba(255,255,255,.78);
    }

    .catalog-badges {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 52px;
      z-index: 5;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      padding: 10px 12px;
      border: 1px solid rgba(184,139,63,.24);
      border-radius: 8px;
      background: rgba(255,255,255,.46);
      backdrop-filter: blur(10px);
    }

    .badge-item {
      min-width: 0;
      display: grid;
      place-items: center;
      gap: 4px;
      color: var(--ink);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      text-align: center;
      text-transform: uppercase;
      border-right: 1px solid rgba(184,139,63,.24);
    }

    .badge-item:last-child {
      border-right: 0;
    }

    .badge-item svg {
      width: 24px;
      height: 24px;
      color: var(--gold);
      stroke-width: 1.6;
    }

    .mug-stage::before {
      content: "3D MOCKUP";
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 3;
      color: rgba(12,36,64,.62);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .22em;
    }

    .mug-stage::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 34%;
      background: linear-gradient(180deg, transparent, rgba(38, 82, 111, .10));
      pointer-events: none;
      z-index: 1;
    }

    #mugCanvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: min(62vh, 640px);
      cursor: grab;
      touch-action: none;
      position: relative;
      z-index: 2;
    }

    #mugCanvas:active {
      cursor: grabbing;
    }

    .meter {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 24px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(23, 53, 84, .13);
      z-index: 4;
    }

    .meter span {
      display: block;
      height: 100%;
      width: calc(var(--progress) * 100%);
      background: linear-gradient(90deg, #173554, var(--gold), #d8aa57);
    }

    .loader {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #273039;
      font-size: 14px;
      pointer-events: none;
      z-index: 1;
    }

    .is-ready .loader {
      display: none;
    }

    @media (max-width: 900px) {
      .topbar,
      .workspace {
        padding-inline: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
        overflow: auto;
      }

      .mug-stage,
      #mugCanvas {
        min-height: 470px;
      }

      .catalog-badges {
        display: none;
      }

      h1 {
        font-size: clamp(34px, 13vw, 58px);
      }
    }

    /* Dark premium DUVEN7 direction */
    :root {
      --ink: #f8fafb;
      --muted: #9aa4aa;
      --line: rgba(255,255,255,.18);
      --accent: #10b99f;
      --accent-2: #ff3158;
      --gold: #ffcf3f;
      --shadow: 0 34px 90px rgba(0, 0, 0, .38);
    }

    body {
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(16,185,159,.16) 0 18%, transparent 18% 100%),
        linear-gradient(160deg, #050607 0%, #0b1014 46%, #17110d 100%);
    }

    body::before,
    body::after,
    main::before,
    main::after,
    .workspace::before,
    .workspace::after,
    .duven-spark,
    .brand-mark,
    .cloud-float,
    .mug-arch,
    .catalog-badges {
      display: none;
    }

    .topbar {
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      background: rgba(5, 6, 7, .74);
    }

    .topbar::after {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.38), transparent);
    }

    .brand::before {
      content: "DUVEN7 • STUDIO 11OZ";
      color: var(--gold);
    }

    h1 {
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(38px, 6vw, 88px);
      font-weight: 900;
      line-height: .88;
      text-transform: uppercase;
    }

    .subtitle {
      color: #c3c9cd;
    }

    .file-button,
    .reset-button {
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 8px;
      box-shadow: 0 18px 34px rgba(0, 0, 0, .28);
    }

    .file-button {
      border-color: #fff;
      background: #fff;
      color: #0a0d10;
    }

    .reset-button {
      background: transparent;
      color: #fff;
    }

    .art-panel::before {
      color: rgba(255, 207, 63, .82);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
    }

    .art-panel::after {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
    }

    .art-frame {
      border: 1px solid rgba(255,255,255,.16);
      background: #f7f7f5;
    }

    .art-frame::before {
      background: rgba(5, 6, 7, .78);
      color: #fff;
    }

    .scan {
      border-right: 4px solid #050607;
      box-shadow: 22px 0 34px rgba(0, 0, 0, .22);
    }

    .progress-line,
    .meter span {
      background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent-2));
    }

    .hint {
      color: #d5dbdf;
    }

    .mug-stage {
      border: 1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 255, 255, .9), rgba(218, 229, 234, .46) 31%, transparent 55%),
        linear-gradient(145deg, #f4f7f8 0%, #dce6ea 52%, #c7d3d8 100%);
    }

    .mug-stage::before {
      content: "DUVEN7 MOCKUP";
      color: rgba(8,10,12,.72);
    }

    .mug-stage::after {
      background: linear-gradient(180deg, transparent, rgba(5, 6, 7, .10));
    }

    .meter {
      background: rgba(5, 6, 7, .14);
    }

    .loader {
      color: #273039;
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <span class="duven-spark spark-a"></span>
    <span class="duven-spark spark-b"></span>
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><span class="cloud-icon"><span class="cloud-core"></span></span>DUVEN7</div>
        <h1>DUVEN7 Mockup Studio</h1>
        <p class="subtitle">Visualize artes de caneca 11oz com acabamento de estúdio, textura envolvente e rotação em tempo real.</p>
      </div>

      <div class="actions">
        <label class="file-button" for="artUpload">Carregar arte</label>
        <input id="artUpload" type="file" accept="image/*">
        <button class="reset-button" type="button" id="resetButton">Reiniciar</button>
      </div>
    </header>

    <section class="workspace">
      <section class="art-panel">
        <div class="art-frame" id="artFrame" aria-label="Area da arte de sublimacao">
          <div class="art-demo"></div>
          <canvas class="art-image" id="artPreviewCanvas"></canvas>
          <div class="scan"></div>
          <div class="progress-line"></div>
        </div>
        <div class="hint">
          <span>Formato base: 2100x950 px</span>
          <span id="percentText">0% estampado</span>
        </div>
      </section>

      <aside class="mug-stage" id="mugStage" aria-label="Previa 3D da caneca de ceramica 11oz">
        <span class="cloud-float one"></span>
        <span class="cloud-float two"></span>
        <span class="mug-arch"></span>
        <canvas id="mugCanvas"></canvas>
        <div class="loader">Carregando 3D</div>
        <div class="catalog-badges" aria-hidden="true">
          <div class="badge-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 12v9H4v-9"/><path d="M2 7h20v5H2z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 1 1 2.5-2.5C10 6 12 7 12 7z"/><path d="M12 7h4.5A2.5 2.5 0 1 0 14 4.5C14 6 12 7 12 7z"/></svg>
            <span>Ocasião</span>
          </div>
          <div class="badge-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
            <span>Memória</span>
          </div>
          <div class="badge-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5 7 22l5-3 5 3-1.5-9.5"/></svg>
            <span>Premium</span>
          </div>
          <div class="badge-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z"/><path d="M19 17l.8 2.2L22 20l-2.2.8L19 23l-.8-2.2L16 20l2.2-.8z"/></svg>
            <span>Autoral</span>
          </div>
        </div>
        <div class="meter"><span></span></div>
      </aside>
    </section>
  </main>

  <script src="./vendor/three.min.js"></script>
  <script src="./vendor/GLTFLoader.classic.js"></script>
  <script src="./mug-data.js"></script>
  <script>
    const app = document.getElementById('app');
    const artFrame = document.getElementById('artFrame');
    const upload = document.getElementById('artUpload');
    const resetButton = document.getElementById('resetButton');
    const percentText = document.getElementById('percentText');
    const mugStage = document.getElementById('mugStage');
    const canvas = document.getElementById('mugCanvas');
    const loaderLabel = document.querySelector('.loader');

    const textureCanvas = document.createElement('canvas');
    const textureContext = textureCanvas.getContext('2d');
    textureCanvas.width = 2048;
    textureCanvas.height = 928;

    const previewCanvas = document.getElementById('artPreviewCanvas');
    const previewContext = previewCanvas.getContext('2d');
    previewCanvas.width = 2100;
    previewCanvas.height = 950;

    let progress = 0;
    let customArtImage = null;
    let currentObjectUrl = null;
    let mugGroup;
    let bodyMaterial;
    let stampTexture;
    let targetRotationY = -0.18;
    let targetRotationX = -0.02;
    let isDragging = false;
    let lastPointerX = 0;
    let lastPointerY = 0;
    const MUG_MODEL_URL = window.MUG_GLB_DATA_URL || './mug-clean.glb';
    const DEFAULT_ART_URL = './PAI2601.png';
    const HANDLE_GAP_RADIANS = 1.04;
    const PRINT_SIDE_MARGIN = 0.075;
    const PRINT_TOP_BOTTOM_MARGIN = 0.055;

    function drawDemoArt(ctx, width, height) {
      const main = ctx.createLinearGradient(0, 0, width, height);
      main.addColorStop(0, '#ffd45a');
      main.addColorStop(.28, '#f05a68');
      main.addColorStop(.58, '#188ac6');
      main.addColorStop(1, '#0f9f8f');
      ctx.fillStyle = main;
      ctx.fillRect(0, 0, width, height);

      ctx.globalAlpha = .22;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = Math.max(12, width * .007);
      for (let x = -height; x < width; x += width * .055) {
        ctx.beginPath();
        ctx.moveTo(x, height);
        ctx.lineTo(x + height, 0);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      const circles = [
        [0.13, 0.22, 0.09],
        [0.34, 0.72, 0.055],
        [0.58, 0.28, 0.075],
        [0.76, 0.36, 0.065],
        [0.9, 0.72, 0.05]
      ];
      circles.forEach(([x, y, r]) => {
        ctx.fillStyle = 'rgba(255,255,255,.62)';
        ctx.beginPath();
        ctx.arc(width * x, height * y, height * r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.fillStyle = 'rgba(255,255,255,.74)';
      ctx.font = `700 ${Math.round(height * .16)}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('SUA ARTE 2100 x 950', width / 2, height / 2);
    }

    function resizeTextureForImage(image) {
      const ratio = image.naturalWidth / image.naturalHeight;
      textureCanvas.width = 4096;
      textureCanvas.height = Math.round(textureCanvas.width / ratio);
      previewCanvas.width = 2100;
      previewCanvas.height = Math.round(previewCanvas.width / ratio);
      artFrame.style.aspectRatio = `${image.naturalWidth} / ${image.naturalHeight}`;
    }

    function drawArtInto(ctx, width, height) {
      if (customArtImage) {
        ctx.drawImage(customArtImage, 0, 0, width, height);
      } else {
        drawDemoArt(ctx, width, height);
      }
    }

    function updatePreviewBackground() {
      previewContext.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      drawArtInto(previewContext, previewCanvas.width, previewCanvas.height);
      app.classList.add('has-custom-art');
    }

    function updateStampTexture() {
      textureContext.clearRect(0, 0, textureCanvas.width, textureCanvas.height);
      textureContext.fillStyle = '#eaf0f3';
      textureContext.fillRect(0, 0, textureCanvas.width, textureCanvas.height);

      const visibleProgress = progress > .96 ? 1 : progress;
      const printedWidth = Math.round(textureCanvas.width * visibleProgress);
      const marginX = Math.round(textureCanvas.width * PRINT_SIDE_MARGIN);
      const marginY = Math.round(textureCanvas.height * PRINT_TOP_BOTTOM_MARGIN);
      const artX = marginX;
      const artWidth = textureCanvas.width - marginX * 2;
      const artY = marginY;
      const artHeight = textureCanvas.height - marginY * 2;
      if (printedWidth > 0) {
        textureContext.save();
        textureContext.beginPath();
        textureContext.rect(0, 0, printedWidth, textureCanvas.height);
        textureContext.clip();
        textureContext.fillStyle = '#ffffff';
        textureContext.fillRect(artX, artY, artWidth, artHeight);
        textureContext.save();
        textureContext.beginPath();
        textureContext.rect(artX, artY, artWidth, artHeight);
        textureContext.clip();
        textureContext.translate(artX, artY);
        drawArtInto(textureContext, artWidth, artHeight);
        textureContext.restore();
        textureContext.restore();
      }

      textureContext.save();
      textureContext.globalCompositeOperation = 'multiply';
      const sideShade = textureContext.createLinearGradient(0, 0, textureCanvas.width, 0);
      sideShade.addColorStop(0, 'rgba(210,220,225,.58)');
      sideShade.addColorStop(.16, 'rgba(238,242,244,.22)');
      sideShade.addColorStop(.50, 'rgba(255,255,255,0)');
      sideShade.addColorStop(.84, 'rgba(230,236,239,.26)');
      sideShade.addColorStop(1, 'rgba(188,202,210,.62)');
      textureContext.fillStyle = sideShade;
      textureContext.fillRect(0, 0, textureCanvas.width, textureCanvas.height);
      textureContext.restore();

      if (stampTexture) stampTexture.needsUpdate = true;
    }

    function setProgress(value) {
      progress = Math.max(0, Math.min(1, value));
      app.style.setProperty('--progress', progress.toFixed(4));
      percentText.textContent = `${Math.round(progress * 100)}% estampado`;
      updateStampTexture();

      if (progress >= .995 && mugGroup && !isDragging) {
        targetRotationY += .012;
      }
    }

    function updateFromPoint(clientX) {
      const rect = artFrame.getBoundingClientRect();
      setProgress((clientX - rect.left) / rect.width);
    }

    function createMaterials() {
      stampTexture = new THREE.CanvasTexture(textureCanvas);
      stampTexture.encoding = THREE.sRGBEncoding;
      stampTexture.wrapS = THREE.ClampToEdgeWrapping;
      stampTexture.wrapT = THREE.ClampToEdgeWrapping;
      stampTexture.anisotropy = 8;

      bodyMaterial = new THREE.MeshPhysicalMaterial({
        map: stampTexture,
        roughness: .62,
        metalness: 0,
        clearcoat: .18,
        clearcoatRoughness: .62,
        reflectivity: .18
      });

      const ceramicMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xd7e1e5,
        roughness: .66,
        clearcoat: .16,
        clearcoatRoughness: .7,
        reflectivity: .14
      });

      return { stampMaterial: bodyMaterial, ceramicMaterial };
    }

    function printableUFromPosition(x, z) {
      const theta = (Math.atan2(z, x) + Math.PI * 2) % (Math.PI * 2);
      if (theta < HANDLE_GAP_RADIANS || theta > Math.PI * 2 - HANDLE_GAP_RADIANS) return null;
      return (theta - HANDLE_GAP_RADIANS) / (Math.PI * 2 - HANDLE_GAP_RADIANS * 2);
    }

    function prepareMugMesh(mesh, materials) {
      if (mesh.name && mesh.name.includes('printable-body')) {
        const uv = mesh.geometry.attributes.uv;
        if (uv && !mesh.geometry.userData.uvFlippedForPreview) {
          for (let i = 0; i < uv.count; i++) {
            uv.setX(i, 1 - uv.getX(i));
          }
          uv.needsUpdate = true;
          mesh.geometry.userData.uvFlippedForPreview = true;
        }
        mesh.material = materials.stampMaterial;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return;
      }

      if (mesh.name && mesh.name.includes('ceramic')) {
        mesh.material = materials.ceramicMaterial;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return;
      }

      const geometry = mesh.geometry;
      geometry.computeBoundingBox();
      const box = geometry.boundingBox;
      const position = geometry.attributes.position;
      const uv = new Float32Array(position.count * 2);
      const radii = [];

      for (let i = 0; i < position.count; i++) {
        const x = position.getX(i);
        const z = position.getZ(i);
        radii.push(Math.hypot(x, z));
      }

      radii.sort((a, b) => a - b);
      const bodyRadiusLimit = radii[Math.floor(radii.length * .82)];
      const height = Math.max(.001, box.max.y - box.min.y);
      const printMinY = box.min.y + height * .08;
      const printMaxY = box.max.y - height * .08;

      for (let i = 0; i < position.count; i++) {
        const x = position.getX(i);
        const y = position.getY(i);
        const z = position.getZ(i);
        const u = printableUFromPosition(x, z);
        uv[i * 2] = u === null ? 0 : u;
        uv[i * 2 + 1] = THREE.MathUtils.clamp((y - box.min.y) / height, 0, 1);
      }

      geometry.setAttribute('uv', new THREE.BufferAttribute(uv, 2));

      const sourceIndex = geometry.index
        ? Array.from(geometry.index.array)
        : Array.from({ length: position.count }, (_, index) => index);

      const stamped = [];
      const ceramic = [];

      for (let i = 0; i < sourceIndex.length; i += 3) {
        const tri = [sourceIndex[i], sourceIndex[i + 1], sourceIndex[i + 2]];
        const printable = tri.every(index => {
          const x = position.getX(index);
          const y = position.getY(index);
          const z = position.getZ(index);
          return (
            y >= printMinY &&
            y <= printMaxY &&
            Math.hypot(x, z) <= bodyRadiusLimit &&
            printableUFromPosition(x, z) !== null
          );
        });

        if (printable) {
          stamped.push(...tri);
        } else {
          ceramic.push(...tri);
        }
      }

      geometry.setIndex(stamped.concat(ceramic));
      geometry.clearGroups();
      geometry.addGroup(0, stamped.length, 0);
      geometry.addGroup(stamped.length, ceramic.length, 1);
      mesh.material = [materials.stampMaterial, materials.ceramicMaterial];
      mesh.castShadow = true;
      mesh.receiveShadow = true;
    }

    function fitModelToStage(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      object.position.sub(center);

      const maxSize = Math.max(size.x, size.y, size.z);
      const scale = 2.18 / maxSize;
      object.scale.setScalar(scale);
      const fittedBox = new THREE.Box3().setFromObject(object);
      const fittedCenter = fittedBox.getCenter(new THREE.Vector3());
      object.position.y += .66 - fittedCenter.y;
      object.rotation.y = targetRotationY;
      object.rotation.x = targetRotationX;
    }

    async function buildMug(scene) {
      const materials = createMaterials();
      const loader = new THREE.GLTFLoader();
      loaderLabel.textContent = 'Carregando modelo 3D';
      const gltf = await loader.loadAsync(MUG_MODEL_URL);

      mugGroup = gltf.scene;
      mugGroup.traverse(child => {
        if (child.isMesh) {
          prepareMugMesh(child, materials);
        }
      });

      fitModelToStage(mugGroup);

      scene.add(mugGroup);
    }

    function init3d() {
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      renderer.outputEncoding = THREE.sRGBEncoding;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(34, 1, .1, 100);
      camera.position.set(0, .82, 7.15);

      scene.add(new THREE.HemisphereLight(0xf5fbff, 0xb7c2c8, 1.05));

      const key = new THREE.DirectionalLight(0xf6fbff, 1.18);
      key.position.set(-4.6, 5.2, 2.1);
      key.castShadow = true;
      key.shadow.mapSize.set(1024, 1024);
      scene.add(key);

      const rim = new THREE.DirectionalLight(0xcfe8f3, .42);
      rim.position.set(4, 2, -3.5);
      scene.add(rim);

      const floor = new THREE.Mesh(
        new THREE.CircleGeometry(2.25, 96),
        new THREE.ShadowMaterial({ color: 0x1b2a32, opacity: .24 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -.72;
      floor.receiveShadow = true;
      scene.add(floor);

      buildMug(scene)
        .then(() => {
          updateStampTexture();
          mugStage.classList.add('is-ready');
        })
        .catch(error => {
          console.error('Nao foi possivel carregar o mug.glb', error);
          loaderLabel.textContent = 'Nao foi possivel carregar mug.glb';
        });

      function resize() {
        const rect = canvas.getBoundingClientRect();
        const width = Math.max(1, Math.floor(rect.width));
        const height = Math.max(1, Math.floor(rect.height));
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function render() {
        resize();
        if (mugGroup) {
          mugGroup.rotation.y += (targetRotationY - mugGroup.rotation.y) * .12;
          mugGroup.rotation.x += (targetRotationX - mugGroup.rotation.x) * .12;
        }
        renderer.render(scene, camera);
        requestAnimationFrame(render);
      }

      render();
    }

    artFrame.addEventListener('pointerenter', event => updateFromPoint(event.clientX));
    artFrame.addEventListener('pointermove', event => updateFromPoint(event.clientX));

    canvas.addEventListener('pointerdown', event => {
      isDragging = true;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener('pointermove', event => {
      if (!isDragging) return;
      const dx = event.clientX - lastPointerX;
      const dy = event.clientY - lastPointerY;
      lastPointerX = event.clientX;
      lastPointerY = event.clientY;
      targetRotationY += dx * .012;
      targetRotationX = THREE.MathUtils.clamp(targetRotationX + dy * .006, -.45, .32);
    });

    canvas.addEventListener('pointerup', event => {
      isDragging = false;
      canvas.releasePointerCapture(event.pointerId);
    });

    canvas.addEventListener('pointercancel', () => {
      isDragging = false;
    });

    upload.addEventListener('change', () => {
      const file = upload.files && upload.files[0];
      if (!file) return;

      const image = new Image();
      image.onload = () => {
        customArtImage = image;
        resizeTextureForImage(image);
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = image.src;
        updatePreviewBackground();
        setProgress(0);
      };
      image.src = URL.createObjectURL(file);
    });

    resetButton.addEventListener('click', () => {
      targetRotationY = -0.18;
      targetRotationX = -0.02;
      setProgress(0);
    });

    function loadDefaultArt() {
      const image = new Image();
      image.onload = () => {
        customArtImage = image;
        resizeTextureForImage(image);
        updatePreviewBackground();
        setProgress(0);
      };
      image.onerror = () => {
        updatePreviewBackground();
        setProgress(0);
      };
      image.src = DEFAULT_ART_URL;
    }

    loadDefaultArt();
    setProgress(0);
    init3d();
  </script>
</body>
</html>
